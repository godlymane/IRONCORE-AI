name: CI / Build Check\n\non:\n  push:\n    branches: [\"main\", \"dev\"]\n  pull_request:\n    branches: [\"main\", \"dev\"]\n\njobs:\n  build:\n    name: Build & Lint React Prototype\n    runs-on: ubuntu-latest\n\n    steps:\n      - name: Checkout Code\n        uses: actions/checkout@v4\n\n      - name: Setup Node.js\n        uses: actions/setup-node@v4\n        with:\n          node-version: 20\n          cache: \"npm\"\n\n      - name: Install Dependencies\n        run: npm ci\n\n      - name: Run Linter\n        run: npm run lint\n        continue-on-error: true # Warning only for now, don't break the build\n\n      - name: Build Vite App\n        run: npm run build\n        env:\n          VITE_FIREBASE_API_KEY: \"test-key\"\n          VITE_FIREBASE_PROJECT_ID: \"ironcore-f68c2\"\n\n      - name: Install Firebase Functions Dependencies\n        working-directory: ./functions\n        run: npm ci\n