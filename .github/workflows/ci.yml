name: CI / Build Check

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read

jobs:
  build:
    name: Build & Lint React Prototype
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      # TODO: flip continue-on-error → false once the pre-existing lint
      # debt in src/views/* is cleared. Tracked separately from the
      # security-audit pass that added the test step below.
      - name: Run Linter
        run: npm run lint
        continue-on-error: true

      - name: Run Unit Tests
        run: npm test -- --run --passWithNoTests

      - name: Build Vite App
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "test-key"
          VITE_FIREBASE_PROJECT_ID: "ironcore-f68c2"

      - name: Install Firebase Functions Dependencies
        working-directory: ./functions
        run: npm ci
