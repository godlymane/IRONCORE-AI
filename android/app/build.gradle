apply plugin: 'com.android.application'

// Load local.properties for signing passwords
def localProps = new Properties()
def localPropsFile = rootProject.file('local.properties')
if (localPropsFile.exists()) {
    localProps.load(localPropsFile.newDataInputStream())
}

android {
    namespace "com.ironcore.ai"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.ironcore.ai"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
        aaptOptions {
             ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            storeFile file('ironcore-release.jks')
            storePassword localProps['IRONCORE_KEYSTORE_PASSWORD'] ?: System.getenv('IRONCORE_KEYSTORE_PASSWORD') ?: ''
            keyAlias 'ironcore_release'
            keyPassword localProps['IRONCORE_KEY_PASSWORD'] ?: System.getenv('IRONCORE_KEY_PASSWORD') ?: ''
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-ktx:$androidxCoreKTXVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    
    // Firebase BoM (Bill of Materials) - manages Firebase dependency versions
    implementation platform('com.google.firebase:firebase-bom:34.9.0')
    
    // Firebase Authentication
    implementation 'com.google.firebase:firebase-auth'
    
    // Google Sign-In (Required by @capacitor-firebase/authentication for google.com provider)
    implementation 'com.google.android.gms:play-services-auth:21.0.0'

    // Firebase Analytics (optional but recommended)
    implementation 'com.google.firebase:firebase-analytics'
}

// Resolution strategy removed - using compileSdk 35 which supports latest deps

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}