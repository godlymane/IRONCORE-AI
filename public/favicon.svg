    <rect x="120" y="-50" width="40" height="100" rx="8" fill="url(#ironGrad)"/>
    <rect x="156" y="-40" width="24" height="80" rx="6" fill="url(#ironGrad)"/>
  </g>
  <!-- AI Sparkle -->
  <circle cx="380" cy="120" r="24" fill="#FBBF24"/>
  <path d="M380 90 L383 112 L405 115 L383 118 L380 140 L377 118 L355 115 L377 112 Z" fill="white"/>
