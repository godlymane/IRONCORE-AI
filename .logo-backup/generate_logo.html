<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #111; }
canvas { border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1024, H = 1024;

// Background - pure black
ctx.fillStyle = '#000000';
ctx.fillRect(0, 0, W, H);

// Center point
const cx = W / 2, cy = H / 2 - 30;

// Draw hexagonal outer frame with red glow
function drawHexFrame() {
    const radius = 360;
    const sides = 6;

    // Outer glow
    ctx.save();
    ctx.shadowColor = '#dc2626';
    ctx.shadowBlur = 40;
    ctx.strokeStyle = '#dc2626';
    ctx.lineWidth = 4;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 2;
        const x = cx + radius * Math.cos(angle);
        const y = cy + radius * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();

    // Inner subtle line
    const innerR = 340;
    ctx.strokeStyle = 'rgba(220, 38, 38, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 2;
        const x = cx + innerR * Math.cos(angle);
        const y = cy + innerR * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
}

// Draw the IC monogram - bold, angular, tech feel
function drawMonogram() {
    ctx.save();

    // "I" - left side, bold angular bar
    const grad1 = ctx.createLinearGradient(cx - 160, cy - 140, cx - 160, cy + 140);
    grad1.addColorStop(0, '#ef4444');
    grad1.addColorStop(0.5, '#dc2626');
    grad1.addColorStop(1, '#991b1b');

    ctx.fillStyle = grad1;
    // Bold I with angled cuts
    ctx.beginPath();
    ctx.moveTo(cx - 185, cy - 150);  // top-left
    ctx.lineTo(cx - 115, cy - 150);  // top-right
    ctx.lineTo(cx - 125, cy - 110);  // notch right
    ctx.lineTo(cx - 140, cy - 110);  // inner top-right
    ctx.lineTo(cx - 140, cy + 110);  // inner bottom-right
    ctx.lineTo(cx - 125, cy + 110);  // notch right
    ctx.lineTo(cx - 115, cy + 150);  // bottom-right
    ctx.lineTo(cx - 185, cy + 150);  // bottom-left
    ctx.lineTo(cx - 175, cy + 110);  // notch left
    ctx.lineTo(cx - 160, cy + 110);  // inner bottom-left
    ctx.lineTo(cx - 160, cy - 110);  // inner top-left
    ctx.lineTo(cx - 175, cy - 110);  // notch left
    ctx.closePath();
    ctx.fill();

    // "C" - right side, angular C shape
    const grad2 = ctx.createLinearGradient(cx + 20, cy - 150, cx + 180, cy + 150);
    grad2.addColorStop(0, '#ef4444');
    grad2.addColorStop(0.5, '#dc2626');
    grad2.addColorStop(1, '#991b1b');

    ctx.fillStyle = grad2;
    ctx.beginPath();
    // Outer C
    ctx.moveTo(cx + 180, cy - 150);  // top-right
    ctx.lineTo(cx + 40, cy - 150);   // top-left
    ctx.lineTo(cx + 20, cy - 120);   // angle cut
    ctx.lineTo(cx + 20, cy + 120);   // left side down
    ctx.lineTo(cx + 40, cy + 150);   // bottom-left angle
    ctx.lineTo(cx + 180, cy + 150);  // bottom-right
    ctx.lineTo(cx + 170, cy + 110);  // inner bottom-right
    ctx.lineTo(cx + 65, cy + 110);   // inner bottom
    ctx.lineTo(cx + 55, cy + 90);    // inner angle
    ctx.lineTo(cx + 55, cy - 90);    // inner left
    ctx.lineTo(cx + 65, cy - 110);   // inner angle
    ctx.lineTo(cx + 170, cy - 110);  // inner top
    ctx.lineTo(cx + 180, cy - 150);  // back to top
    ctx.closePath();
    ctx.fill();

    // Add metallic highlight
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx - 180, cy - 150, 60, 5);
    ctx.fillRect(cx + 25, cy - 150, 150, 5);
    ctx.globalAlpha = 1;

    ctx.restore();
}

// Draw accent lines - tech/HUD feel
function drawAccentLines() {
    ctx.save();
    ctx.strokeStyle = 'rgba(220, 38, 38, 0.4)';
    ctx.lineWidth = 1;

    // Top-left corner accent
    ctx.beginPath();
    ctx.moveTo(cx - 300, cy - 280);
    ctx.lineTo(cx - 200, cy - 280);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx - 300, cy - 280);
    ctx.lineTo(cx - 300, cy - 180);
    ctx.stroke();

    // Bottom-right corner accent
    ctx.beginPath();
    ctx.moveTo(cx + 300, cy + 280);
    ctx.lineTo(cx + 200, cy + 280);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx + 300, cy + 280);
    ctx.lineTo(cx + 300, cy + 180);
    ctx.stroke();

    // Small dots at corners
    ctx.fillStyle = '#dc2626';
    ctx.beginPath();
    ctx.arc(cx - 300, cy - 280, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + 300, cy + 280, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

// Draw text
function drawText() {
    ctx.save();
    ctx.textAlign = 'center';

    // "IRONCORE" text
    ctx.font = '900 52px "Segoe UI", Arial, sans-serif';
    ctx.letterSpacing = '12px';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('IRONCORE', cx, cy + 230);

    // "FIT" text - red accent
    ctx.font = '300 52px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#dc2626';
    ctx.fillText('FIT', cx, cy + 290);

    // Thin line separator
    ctx.strokeStyle = 'rgba(220, 38, 38, 0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 100, cy + 248);
    ctx.lineTo(cx + 100, cy + 248);
    ctx.stroke();

    ctx.restore();
}

// Render everything
drawHexFrame();
drawAccentLines();
drawMonogram();
drawText();

// Export buttons
const exportDiv = document.createElement('div');
exportDiv.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;';
[512, 192, 48].forEach(size => {
    const btn = document.createElement('button');
    btn.textContent = `Save ${size}x${size}`;
    btn.style.cssText = 'padding:10px 20px;background:#dc2626;color:white;border:none;cursor:pointer;font-size:14px;border-radius:4px;';
    btn.onclick = () => {
        const c2 = document.createElement('canvas');
        c2.width = c2.height = size;
        c2.getContext('2d').drawImage(canvas, 0, 0, size, size);
        const a = document.createElement('a');
        a.href = c2.toDataURL('image/png');
        a.download = `ironcore-logo-${size}.png`;
        a.click();
    };
    exportDiv.appendChild(btn);
});
document.body.appendChild(exportDiv);
</script>
</body>
</html>
