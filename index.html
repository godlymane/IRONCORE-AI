<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- CRITICAL FIX #1: Add viewport-fit=cover for Capacitor 8 safe areas -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com https://*.firebase.google.com https://*.firebaseio.com wss://*.firebaseio.com https://*.cloudfunctions.net https://*.run.app https://generativelanguage.googleapis.com https://api.razorpay.com; frame-src https://checkout.razorpay.com; frame-ancestors 'none'; base-uri 'self'" />

  <!-- Primary Meta Tags -->
  <title>IronCore AI - Your AI-Powered Fitness Companion</title>
  <meta name="title" content="IronCore AI - Your AI-Powered Fitness Companion" />
  <meta name="description"
    content="Transform your fitness journey with AI coaching, gamified workouts, community battles, and personalized meal tracking. Join the Arena and become legendary!" />
  <meta name="keywords"
    content="fitness app, AI coach, workout tracker, meal logging, gamification, fitness games, health app" />
  <meta name="author" content="IronCore AI" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ironcore.ai/" />
  <meta property="og:title" content="IronCore AI - Your AI-Powered Fitness Companion" />
  <meta property="og:description"
    content="Transform your fitness journey with AI coaching, gamified workouts, and community battles. Join the Arena!" />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://ironcore.ai/" />
  <meta property="twitter:title" content="IronCore AI - Your AI-Powered Fitness Companion" />
  <meta property="twitter:description"
    content="Transform your fitness journey with AI coaching, gamified workouts, and community battles. Join the Arena!" />
  <meta property="twitter:image" content="/og-image.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#dc2626" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IronCore" />
  <!-- Disable Safari phone number linking -->
  <meta name="format-detection" content="telephone=no" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://firestore.googleapis.com" />

  <!-- Splash screens for iOS -->
  <meta name="apple-touch-startup-image" content="/splash.png" />

  <!-- Native App CSS Overrides + Safe Area Support -->
  <style>
    /* Root CSS variables for safe area insets (read by JS if needed) */
    :root {
      --sai-top: env(safe-area-inset-top, 0px);
      --sai-right: env(safe-area-inset-right, 0px);
      --sai-bottom: env(safe-area-inset-bottom, 0px);
      --sai-left: env(safe-area-inset-left, 0px);
    }

    body {
      overscroll-behavior-y: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      
      /* CRITICAL: Apply safe area padding to body for Capacitor 8 */
      /* This ensures content doesn't get clipped behind notches/nav bars */
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      /* Note: bottom padding handled per-component (nav bars, etc) */
    }
    
    input, textarea {
      -webkit-user-select: auto;
      user-select: auto;
    }

    /* iOS keyboard fix: prevent zoom on input focus */
    input, select, textarea {
      font-size: 16px !important;
    }
  </style>
</head>

<body style="background:#000;margin:0;padding-top:env(safe-area-inset-top);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)" class="bg-black">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
